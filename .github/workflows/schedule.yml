name: Nintendo Ticket Monitor

on:
  workflow_dispatch: # GitHub 웹에서 수동으로 실행할 수 있는 버튼 생성
  schedule:
    - cron: '0 */6 * * *' # 6시간마다 자동으로 실행 (UTC 기준)

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests

      - name: Run Scraper Script
        env:
          # GitHub 레포지토리 Settings -> Secrets and variables -> Actions에 등록한 값 매핑
          GENERAL_WEBHOOK: ${{ secrets.GENERAL_WEBHOOK }}
          LOG_WEBHOOK: ${{ secrets.LOG_WEBHOOK }}
        run: python monitor.py
