name: Nintendo Ticket Detector

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Run Sniper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NINTENDO_COOKIE: ${{ secrets.NINTENDO_COOKIE }}
          NINTENDO_XSRF: ${{ secrets.NINTENDO_XSRF }}
          GITHUB_EVENT_NAME: ${{ github.event_name }} # 이벤트 이름 전달
        run: python main.py
